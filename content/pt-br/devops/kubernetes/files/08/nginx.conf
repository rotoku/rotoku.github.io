http {
    server {
        listen 80;
        listen 443 ssl;
        ssl_certificate /etc/nginx/ssl/certificado.crt;
        ssl_certificate_key /etc/nginx/ssl/chave_privada.key;

        location / {
            return 200 'Olá terraqueos e extraterrestres!\n';
            add_header Content-Type text/plain;
        }
    }
}